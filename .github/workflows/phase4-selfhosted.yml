name: Phase 4 SELF-HOSTED (8 Mac runners, parallel to cloud)

on:
  workflow_dispatch:

jobs:
  process:
    runs-on: [self-hosted, parth-mac]
    timeout-minutes: 600
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        chunk: [0,1,2,3,4,5,6,7]
    steps:
      - uses: actions/checkout@v4

      - name: Use system Python
        run: |
          which python3
          python3 --version

      - name: Install deps
        run: |
          python3 -m pip install --user --break-system-packages google-genai 2>/dev/null || python3 -m pip install --user google-genai

      - name: Process chunk (multi-key rotation)
        env:
          CHUNK_INDEX: ${{ matrix.chunk }}
          TOTAL_CHUNKS: 8
          GEMINI_KEYS_JSON: ${{ secrets.GEMINI_KEYS_JSON }}
          PYTHONUNBUFFERED: "1"
        run: |
          python3 -c "import json,os; [print('::add-mask::'+k) for k in json.loads(os.environ['GEMINI_KEYS_JSON'])]"
          python3 pipeline/phase4_chunk.py

      - name: Upload results as artifact
        if: always()
        env:
          CHUNK_INDEX: ${{ matrix.chunk }}
        uses: actions/upload-artifact@v4
        with:
          name: phase4-selfhosted-chunk-${{ matrix.chunk }}
          path: results/
          if-no-files-found: warn
          retention-days: 7
